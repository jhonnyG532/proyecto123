version: '3.8'

services:
  # Base de datos PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: ovni_burger_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-5331}
      POSTGRES_DB: ${DB_NAME:-ovni_burger}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ovni_network

  # Aplicación Flask
  app:
    build: .
    container_name: ovni_burger_app
    restart: always
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=${FLASK_ENV:-production}
      - DATABASE_URL=postgresql://postgres:${DB_PASSWORD:-5331}@postgres:${DB_PORT:-5432}/${DB_NAME:-ovni_burger}
      - SECRET_KEY=${SECRET_KEY:-changeme}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-changeme}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./app:/app/app
    networks:
      - ovni_network

  # Nginx como reverse proxy
  nginx:
    image: nginx:alpine
    container_name: ovni_burger_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - ovni_network

volumes:
  postgres_data:

networks:
  ovni_network:
    driver: bridge