<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ovni Burger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fffdfa; font-family: 'Nunito', sans-serif; }
        .card { border: none; border-radius: 40px 10px 40px 10px; box-shadow: -5px 15px 35px rgba(0,0,0,0.08); background: #fffafa; overflow: hidden; transition: all 0.3s;}
        .card:hover { transform: translateY(-5px); box-shadow: -10px 20px 40px rgba(0,0,0,0.12); border-radius: 10px 40px 10px 40px; }
        .nav-pills .nav-link { border-radius: 20px 5px 20px 5px; font-weight: 700; color: #8b4513; margin: 0 5px; transition: all 0.3s;}
        .nav-pills .nav-link.active { background-color: #d4a574; color: #2c1810; border-radius: 5px 20px 5px 20px; }
        .navbar-brand { font-weight: 800; font-size: 1.5rem; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); transition: all 0.3s;}
        .navbar-brand:hover { transform: scale(1.05) rotate(-2deg); }
        .btn { border-radius: 15px 5px 15px 5px; font-weight: bold; transition: all 0.3s;}
        .btn:hover { border-radius: 5px 15px 5px 15px; transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background: linear-gradient(135deg, #2c1810, #8b4513); border-radius: 0 0 20px 50px; padding: 20px 0; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(44, 24, 16, 0.2);">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-ufo"></i> Admin</a>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-light btn-sm">Ver Menú</a>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Salir</button>
            </div>
        </div>
    </nav>
    <div class="container my-4">
        <h2 class="text-center mb-4">Panel Ovni Burger</h2>
        <ul class="nav nav-pills justify-content-center mb-4">
            <li class="nav-item"><button class="nav-link active" onclick="showTab('productos', this)">Productos</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('categorias', this)">Categorías</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('sugerencias', this)">Sugerencias</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('config', this)">Configuración</button></li>
        </ul>
        
        <div id="tab-productos">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Gestión de Productos</h5></div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead><tr><th>Código</th><th>Nombre</th><th>Precio</th><th>Categoría</th><th>Estado</th><th>Acciones</th></tr></thead>
                        <tbody id="productsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <div id="tab-categorias" style="display:none;">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Categorías</h5></div>
                <div class="card-body">
                    <table class="table"><thead><tr><th>Nombre</th><th>Icono</th><th>Orden</th><th>Acciones</th></tr></thead>
                    <tbody id="categoriasTable"></tbody></table>
                </div>
            </div>
        </div>
        
        <div id="tab-sugerencias" style="display:none;">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Sugerencias de Clientes</h5></div>
                <div class="card-body">
                    <table class="table"><thead><tr><th>ID</th><th>Nombre</th><th>Mensaje</th><th>Fecha</th><th>Acciones</th></tr></thead>
                    <tbody id="sugerenciasTable"></tbody></table>
                </div>
            </div>
        </div>
        
        <div id="tab-config" style="display:none;">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Configuración</h5></div>
                <div class="card-body">
                    <form id="configForm">
                        <div class="mb-3"><label class="form-label">Nombre</label><input type="text" class="form-control" id="cfgNombre"></div>
                        <div class="mb-3"><label class="form-label">Teléfono</label><input type="text" class="form-control" id="cfgTel"></div>
                        <div class="mb-3"><label class="form-label">Dirección</label><input type="text" class="form-control" id="cfgDir"></div>
                        <div class="mb-3"><label class="form-label">Instagram</label><input type="text" class="form-control" id="cfgInstagram"></div>
                        <div class="mb-3"><label class="form-label">NIT</label><input type="text" class="form-control" id="cfgNit"></div>
                        <div class="mb-3"><label class="form-label">Mensaje Pie</label><input type="text" class="form-control" id="cfgMsg"></div>
                        <button type="submit" class="btn btn-primary">Guardar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/panel-galaxia-2026';
    function logout() { localStorage.clear(); window.location.href = '/panel-galaxia-2026'; }
    function show(msg) { alert(msg); }
    function showTab(tab, el) {
        ['productos', 'categorias', 'sugerencias', 'config'].forEach(t => document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none');
        document.querySelectorAll('.nav-pills .nav-link').forEach(b => b.classList.remove('active'));
        if (el) el.classList.add('active');
        if (tab === 'productos') loadProducts();
        if (tab === 'categorias') loadCategorias();
        if (tab === 'sugerencias') loadSugerencias();
        if (tab === 'config') loadConfig();
    }
    async function loadProducts() {
        const res = await fetch('/api/productos', {headers:{'Authorization':'Bearer '+token}});
        if(res.ok){const data=await res.json();document.getElementById('productsTable').innerHTML=data.map(p=>'<tr><td>'+p.codigo+'</td><td>'+p.nombre+'</td><td>$'+p.precio+'</td><td>'+p.categoria+'</td><td>'+(p.disponible?'Activo':'Inactivo')+'</td><td><button class="btn btn-sm btn-danger py-0 px-2" onclick="delProducto('+p.id+')"><i class="bi bi-trash"></i></button></td></tr>').join('');}
    }
    async function loadCategorias() {
        const res = await fetch('/api/categorias?all=1');
        if(res.ok){const data=await res.json();document.getElementById('categoriasTable').innerHTML=data.map(c=>'<tr><td>'+c.nombre+'</td><td>'+c.icono+'</td><td>'+c.orden+'</td><td><button class="btn btn-sm btn-danger py-0 px-2" onclick="delCategoria('+c.id+')"><i class="bi bi-trash"></i></button></td></tr>').join('');}
    }
    async function loadSugerencias() {
        const res = await fetch('/api/sugerencias', {headers:{'Authorization':'Bearer '+token}});
        if(res.ok){const data=await res.json();document.getElementById('sugerenciasTable').innerHTML=data.map(s=>'<tr><td>'+s.id+'</td><td>'+(s.nombre||'-')+'</td><td>'+(s.mensaje||'-')+'</td><td>'+(s.created_at?new Date(s.created_at).toLocaleDateString():'-')+'</td><td><button class="btn btn-sm btn-danger py-0 px-2" onclick="delSugerencia('+s.id+')"><i class="bi bi-trash"></i></button></td></tr>').join('');}
    }
    async function delProducto(id) { if(confirm('Eliminar producto?')){ await fetch('/api/productos/'+id, {method:'DELETE', headers:{'Authorization':'Bearer '+token}}); loadProducts(); } }
    async function delCategoria(id) { if(confirm('Eliminar categoría?')){ await fetch('/api/categorias/'+id, {method:'DELETE', headers:{'Authorization':'Bearer '+token}}); loadCategorias(); } }
    async function delSugerencia(id) { if(confirm('Eliminar sugerencia?')){ await fetch('/api/sugerencias/'+id, {method:'DELETE', headers:{'Authorization':'Bearer '+token}}); loadSugerencias(); } }
    async function loadConfig() {
        const res = await fetch('/api/configuracion');
        if(res.ok){const c=await res.json();document.getElementById('cfgNombre').value=c.nombre_negocio||'';document.getElementById('cfgTel').value=c.telefono||'';document.getElementById('cfgDir').value=c.direccion||'';document.getElementById('cfgInstagram').value=c.instagram||'';document.getElementById('cfgNit').value=c.nit||'';document.getElementById('cfgMsg').value=c.mensaje_pie||'';}
    }
    document.getElementById('configForm').onsubmit=async(e)=>{e.preventDefault();const res=await fetch('/api/configuracion',{method:'PUT',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({nombre_negocio:document.getElementById('cfgNombre').value,direccion:document.getElementById('cfgDir').value,telefono:document.getElementById('cfgTel').value,nit:document.getElementById('cfgNit').value,mensaje_pie:document.getElementById('cfgMsg').value,instagram:document.getElementById('cfgInstagram').value})});if(res.ok)show('Configuración guardada');};
    loadProducts();
    </script>
</body>
</html>
