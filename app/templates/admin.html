<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ovni Burger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fffdfa; font-family: 'Nunito', sans-serif; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        .btn { border-radius: 10px; font-weight: bold; }
        .form-control, .form-select { border-radius: 10px; border: 2px solid #e0d5c8; }
        .form-control:focus, .form-select:focus { border-color: #d4a574; box-shadow: 0 0 0 0.2rem rgba(212,165,116,0.25); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background: linear-gradient(135deg, #2c1810, #8b4513); padding: 15px 0;">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-ufo"></i> Admin</a>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-light btn-sm">Ver Menú</a>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Salir</button>
            </div>
        </div>
    </nav>
    <div class="container my-4">
        <h2 class="text-center mb-4">Panel Ovni Burger</h2>
        
        <ul class="nav nav-pills justify-content-center mb-4" id="mainTabs">
            <li class="nav-item"><button class="nav-link active" data-tab="productos">Productos</button></li>
            <li class="nav-item"><button class="nav-link" data-tab="categorias">Categorías</button></li>
            <li class="nav-item"><button class="nav-link" data-tab="config">Configuración</button></li>
        </ul>
        
        <!-- PRODUCTOS TAB -->
        <div id="tab-productos">
            <div class="card mb-4">
                <div class="card-header bg-success text-white"><h5 class="mb-0">Nuevo Producto</h5></div>
                <div class="card-body">
                    <form id="productForm">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">Nombre *</label><input type="text" class="form-control" id="prodNombre" required></div>
                            <div class="col-md-3"><label class="form-label">Precio *</label><input type="number" class="form-control" id="prodPrecio" min="0" required></div>
                            <div class="col-md-3"><label class="form-label">Categoría</label><select class="form-select" id="prodCategoria"></select></div>
                            <div class="col-12"><label class="form-label">Descripción</label><textarea class="form-control" id="prodDescripcion" rows="2"></textarea></div>
                            <div class="col-md-6"><label class="form-label">Imagen URL</label><input type="url" class="form-control" id="prodImagen" placeholder="https://..."></div>
                            <div class="col-md-2"><label class="form-label">Stock</label><input type="number" class="form-control" id="prodStock" value="100"></div>
                            <div class="col-md-2"><label class="form-label">Estado</label><select class="form-select" id="prodDisponible"><option value="true">Activo</option><option value="false">Inactivo</option></select></div>
                            <div class="col-md-2 d-flex align-items-end"><button type="submit" class="btn btn-success w-100">Guardar</button></div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-header">Productos</div>
                <div class="card-body">
                    <div id="productsList"></div>
                </div>
            </div>
        </div>
        
        <!-- CATEGORÍAS TAB -->
        <div id="tab-categorias" style="display:none;">
            <div class="card mb-4">
                <div class="card-header bg-success text-white">Nueva Categoría</div>
                <div class="card-body">
                    <form id="categoriaForm">
                        <div class="row g-3">
                            <div class="col-md-4"><label class="form-label">Nombre *</label><input type="text" class="form-control" id="catNombre" required></div>
                            <div class="col-md-4"><label class="form-label">Icono</label><select class="form-select" id="catIcono">
                                <option value="bi-ufo">🚀 Ovni</option>
                                <option value="bi-burger">🍔 Hamburguesa</option>
                                <option value="bi-hot">🌭 Hotdog</option>
                                <option value="bi-french-fries">🍟 Papa</option>
                                <option value="bi-cup-straw">🥤 Bebida</option>
                            </select></div>
                            <div class="col-md-2"><label class="form-label">Orden</label><input type="number" class="form-control" id="catOrden" value="0"></div>
                            <div class="col-md-2 d-flex align-items-end"><button type="submit" class="btn btn-success w-100">Guardar</button></div>
                        </div>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-header">Categorías</div>
                <div class="card-body">
                    <div id="categoriasList"></div>
                </div>
            </div>
        </div>
        
        <!-- CONFIG TAB -->
        <div id="tab-config" style="display:none;">
            <div class="card">
                <div class="card-header">Configuración</div>
                <div class="card-body">
                    <form id="configForm">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">Nombre</label><input type="text" class="form-control" id="cfgNombre"></div>
                            <div class="col-md-6"><label class="form-label">Teléfono</label><input type="text" class="form-control" id="cfgTel"></div>
                            <div class="col-md-6"><label class="form-label">Dirección</label><input type="text" class="form-control" id="cfgDir"></div>
                            <div class="col-md-6"><label class="form-label">Instagram</label><input type="text" class="form-control" id="cfgInstagram"></div>
                            <div class="col-12"><button type="submit" class="btn btn-primary">Guardar</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    var token = localStorage.getItem('token');
    if (!token) window.location.href = '/panel-galaxia-2026';
    
    function logout() { localStorage.clear(); window.location.href = '/panel-galaxia-2026'; }
    
    // Tabs
    document.querySelectorAll('#mainTabs .nav-link').forEach(function(btn){
        btn.onclick = function(){
            document.querySelectorAll('#mainTabs .nav-link').forEach(function(b){ b.classList.remove('active'); });
            this.classList.add('active');
            var tab = this.dataset.tab;
            document.getElementById('tab-productos').style.display = tab === 'productos' ? 'block' : 'none';
            document.getElementById('tab-categorias').style.display = tab === 'categorias' ? 'block' : 'none';
            document.getElementById('tab-config').style.display = tab === 'config' ? 'block' : 'none';
            if(tab === 'productos') loadProducts();
            if(tab === 'categorias') loadCategorias();
            if(tab === 'config') loadConfig();
        };
    });
    
    // PRODUCTOS
    function loadProducts(){
        fetch('/api/productos', {headers:{'Authorization':'Bearer '+token}})
        .then(function(r){ return r.json(); })
        .then(function(data){
            var html = '<table class="table"><thead><tr><th>Nombre</th><th>Precio</th><th>Categoría</th><th>Estado</th><th></th></tr></thead><tbody>';
            data.forEach(function(p){
                html += '<tr><td>'+(p.nombre||'')+'</td><td>$'+(p.precio||0).toLocaleString()+'</td><td>'+(p.categoria||'')+'</td><td>'+(p.disponible?'<span class="badge bg-success">Activo</span>':'<span class="badge bg-secondary">Inactivo</span>')+'</td><td><button class="btn btn-sm btn-danger" onclick="delProducto('+p.id+')">X</button></td></tr>';
            });
            html += '</tbody></table>';
            document.getElementById('productsList').innerHTML = html;
        });
        loadCategoriasForSelect();
    }
    
    function loadCategoriasForSelect(){
        fetch('/api/categorias')
        .then(function(r){ return r.json(); })
        .then(function(data){
            var opts = '<option value="">Seleccionar...</option>';
            data.forEach(function(c){ opts += '<option value="'+c.nombre+'">'+c.nombre+'</option>'; });
            document.getElementById('prodCategoria').innerHTML = opts;
        });
    }
    
    function delProducto(id){
        if(confirm('Eliminar?')){
            fetch('/api/productos/'+id, {method:'DELETE', headers:{'Authorization':'Bearer '+token}})
            .then(function(){ loadProducts(); });
        }
    }
    
    document.getElementById('productForm').onsubmit = function(e){
        e.preventDefault();
        var nombre = document.getElementById('prodNombre').value;
        var precio = parseInt(document.getElementById('prodPrecio').value) || 0;
        if(!nombre || !precio){
            alert('Nombre y precio requeridos');
            return;
        }
        var payload = {
            nombre: nombre,
            precio: precio,
            categoria: document.getElementById('prodCategoria').value,
            descripcion: document.getElementById('prodDescripcion').value,
            imagen: document.getElementById('prodImagen').value,
            stock: parseInt(document.getElementById('prodStock').value) || 100,
            disponible: document.getElementById('prodDisponible').value === 'true'
        };
        fetch('/api/productos', {
            method:'POST',
            headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token},
            body: JSON.stringify(payload)
        }).then(function(r){
            if(r.ok){
                alert('Guardado!');
                document.getElementById('productForm').reset();
                loadProducts();
            }else{
                alert('Error: '+r.status);
            }
        });
    };
    
    // CATEGORÍAS
    function loadCategorias(){
        fetch('/api/categorias?all=1')
        .then(function(r){ return r.json(); })
        .then(function(data){
            var html = '<table class="table"><thead><tr><th>Nombre</th><th>Icono</th><th>Orden</th><th></th></tr></thead><tbody>';
            data.forEach(function(c){
                html += '<tr><td>'+c.nombre+'</td><td><i class="bi '+c.icono+'"></i></td><td>'+c.orden+'</td><td><button class="btn btn-sm btn-danger" onclick="delCategoria('+c.id+')">X</button></td></tr>';
            });
            html += '</tbody></table>';
            document.getElementById('categoriasList').innerHTML = html;
        });
    }
    
    function delCategoria(id){
        if(confirm('Eliminar?')){
            fetch('/api/categorias/'+id, {method:'DELETE', headers:{'Authorization':'Bearer '+token}})
            .then(function(){ loadCategorias(); });
        }
    }
    
    document.getElementById('categoriaForm').onsubmit = function(e){
        e.preventDefault();
        var payload = {
            nombre: document.getElementById('catNombre').value,
            icono: document.getElementById('catIcono').value,
            orden: parseInt(document.getElementById('catOrden').value) || 0
        };
        fetch('/api/categorias', {
            method:'POST',
            headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token},
            body: JSON.stringify(payload)
        }).then(function(r){
            if(r.ok){
                alert('Guardado!');
                document.getElementById('categoriaForm').reset();
                loadCategorias();
            }
        });
    };
    
    // CONFIG
    function loadConfig(){
        fetch('/api/configuracion')
        .then(function(r){ return r.json(); })
        .then(function(c){
            document.getElementById('cfgNombre').value = c.nombre_negocio || '';
            document.getElementById('cfgTel').value = c.telefono || '';
            document.getElementById('cfgDir').value = c.direccion || '';
            document.getElementById('cfgInstagram').value = c.instagram || '';
        });
    }
    
    document.getElementById('configForm').onsubmit = function(e){
        e.preventDefault();
        fetch('/api/configuracion', {
            method:'PUT',
            headers:{'Content-Type':'application/json', 'Authorization':'Bearer '+token},
            body: JSON.stringify({
                nombre_negocio: document.getElementById('cfgNombre').value,
                telefono: document.getElementById('cfgTel').value,
                direccion: document.getElementById('cfgDir').value,
                instagram: document.getElementById('cfgInstagram').value
            })
        }).then(function(r){
            if(r.ok) alert('Guardado!');
        });
    };
    
    // Init
    loadProducts();
    </script>
</body>
</html>
