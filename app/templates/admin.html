<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ovni Burger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #fffdfa; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">🚀 Admin</span>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm">Menú</a>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Salir</button>
            </div>
        </div>
    </nav>
    
    <div class="container my-4">
        <h3>Productos</h3>
        
        <!-- AGREGAR PRODUCTO -->
        <div class="card">
            <div class="card-header bg-success text-white">Agregar / Editar Producto</div>
            <div class="card-body">
                <input type="hidden" id="prodId">
                <div class="row">
                    <div class="col-md-4">
                        <label>Nombre *</label>
                        <input type="text" class="form-control" id="prodNombre">
                    </div>
                    <div class="col-md-2">
                        <label>Precio *</label>
                        <input type="number" class="form-control" id="prodPrecio">
                    </div>
                    <div class="col-md-3">
                        <label>Categoría</label>
                        <select class="form-control" id="prodCat"></select>
                    </div>
                    <div class="col-md-3">
                        <label>Imagen URL</label>
                        <input type="text" class="form-control" id="prodImg">
                    </div>
                    <div class="col-12">
                        <label>Descripción</label>
                        <textarea class="form-control" id="prodDesc" rows="2"></textarea>
                    </div>
                    <div class="col-md-2">
                        <label>Stock</label>
                        <input type="number" class="form-control" id="prodStock" value="100">
                    </div>
                    <div class="col-md-2">
                        <label>Estado</label>
                        <select class="form-control" id="prodDisp">
                            <option value="true">Activo</option>
                            <option value="false">Inactivo</option>
                        </select>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button class="btn btn-success me-2" onclick="saveProduct()">Guardar</button>
                        <button class="btn btn-primary" onclick="newProduct()">Nuevo</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- LISTA PRODUCTOS -->
        <div class="card">
            <div class="card-header">Productos</div>
            <div class="card-body p-0">
                <table class="table" id="prodTable">
                    <thead><tr><th>Nombre</th><th>Precio</th><th>Cat</th><th>Stock</th><th>Estado</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        
        <hr>
        
        <h3>Categorías</h3>
        
        <!-- AGREGAR CATEGORIA -->
        <div class="card">
            <div class="card-header bg-success text-white">Agregar Categoría</div>
            <div class="card-body">
                <input type="hidden" id="catId">
                <div class="row">
                    <div class="col-md-4">
                        <label>Nombre *</label>
                        <input type="text" class="form-control" id="catNom">
                    </div>
                    <div class="col-md-4">
                        <label>Icono</label>
                        <select class="form-control" id="catIcon">
                            <option value="bi-burger">🍔 Hamburguesa</option>
                            <option value="bi-hot">🌭 Hotdog</option>
                            <option value="bi-french-fries">🍟 Papa</option>
                            <option value="bi-cup-straw">🥤 Bebida</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <label>Orden</label>
                        <input type="number" class="form-control" id="catOrd" value="0">
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button class="btn btn-success w-100" onclick="saveCat()">Guardar</button>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- LISTA CATEGORIAS -->
        <div class="card">
            <div class="card-header">Categorías</div>
            <div class="card-body">
                <table class="table" id="catTable">
                    <thead><tr><th>Nombre</th><th>Icono</th><th>Orden</th><th>Acción</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
        
        <hr>
        
        <h3>Imágenes</h3>
        
        <!-- SUBIR IMAGEN -->
        <div class="card">
            <div class="card-header bg-success text-white">Subir Imagen</div>
            <div class="card-body">
                <input type="file" id="fileSel" accept="image/*">
                <button class="btn btn-success mt-2" onclick="uploadImage()">Subir</button>
            </div>
        </div>
        
        <!-- LISTA IMAGENES -->
        <div class="card">
            <div class="card-header">Imágenes</div>
            <div class="card-body">
                <div class="row" id="imgGrid"></div>
            </div>
        </div>
        
        <hr>
        
        <h3>Configuración</h3>
        <div class="card">
            <div class="card-header">Configuración</div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6"><label>Nombre</label><input type="text" class="form-control" id="cfgNom"></div>
                    <div class="col-md-6"><label>Teléfono</label><input type="text" class="form-control" id="cfgTel"></div>
                    <div class="col-md-6"><label>Dirección</label><input type="text" class="form-control" id="cfgDir"></div>
                    <div class="col-md-6"><label>Instagram</label><input type="text" class="form-control" id="cfgIg"></div>
                </div>
                <button class="btn btn-primary mt-2" onclick="saveCfg()">Guardar</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    var tk = localStorage.getItem('token');
    if (!tk) window.location.href = '/panel-galaxia-2026';
    
    function logout() { localStorage.clear(); window.location.href = '/panel-galaxia-2026'; }
    
    // PRODUCTOS
    function loadProducts() {
        fetch('/api/productos', { headers: { 'Authorization': 'Bearer ' + tk } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var h = '';
            data.forEach(function(p) {
                h += '<tr><td>' + p.nombre + '</td><td>$' + p.precio + '</td><td>' + p.categoria + '</td><td>' + p.stock + '</td><td>' + (p.disponible ? 'Activo' : 'Inactivo') + '</td><td><button onclick="editP(' + p.id + ')">Edit</button> <button onclick="delP(' + p.id + ')">Del</button></td></tr>';
            });
            document.querySelector('#prodTable tbody').innerHTML = h;
        });
        fetch('/api/categorias')
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var o = '<option value="">-</option>';
            data.forEach(function(c) { o += '<option value="' + c.nombre + '">' + c.nombre + '</option>'; });
            document.getElementById('prodCat').innerHTML = o;
        });
    }
    
    function editP(id) {
        fetch('/api/productos/' + id, { headers: { 'Authorization': 'Bearer ' + tk } })
        .then(function(r) { return r.json(); })
        .then(function(p) {
            document.getElementById('prodId').value = id;
            document.getElementById('prodNombre').value = p.nombre;
            document.getElementById('prodPrecio').value = p.precio;
            document.getElementById('prodCat').value = p.categoria;
            document.getElementById('prodDesc').value = p.descripcion;
            document.getElementById('prodImg').value = p.imagen;
            document.getElementById('prodStock').value = p.stock;
            document.getElementById('prodDisp').value = p.disponible ? 'true' : 'false';
        });
    }
    
    function delP(id) {
        if (confirm('Eliminar?')) {
            fetch('/api/productos/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + tk } })
            .then(function() { loadProducts(); });
        }
    }
    
    function newProduct() {
        document.getElementById('prodId').value = '';
        document.getElementById('prodNombre').value = '';
        document.getElementById('prodPrecio').value = '';
        document.getElementById('prodCat').value = '';
        document.getElementById('prodDesc').value = '';
        document.getElementById('prodImg').value = '';
        document.getElementById('prodStock').value = '100';
        document.getElementById('prodDisp').value = 'true';
    }
    
    function saveProduct() {
        var nom = document.getElementById('prodNombre').value;
        var pre = parseInt(document.getElementById('prodPrecio').value) || 0;
        if (!nom || !pre) { alert('Nombre y precio requeridos'); return; }
        
        var id = document.getElementById('prodId').value;
        var dat = {
            nombre: nom,
            precio: pre,
            categoria: document.getElementById('prodCat').value,
            descripcion: document.getElementById('prodDesc').value,
            imagen: document.getElementById('prodImg').value,
            stock: parseInt(document.getElementById('prodStock').value) || 100,
            disponible: document.getElementById('prodDisp').value === 'true'
        };
        
        var url = id ? '/api/productos/' + id : '/api/productos';
        var met = id ? 'PUT' : 'POST';
        
        fetch(url, {
            method: met,
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tk },
            body: JSON.stringify(dat)
        })
        .then(function(r) {
            if (r.ok || r.status === 201) {
                alert('Guardado!');
                newProduct();
                loadProducts();
            } else {
                alert('Error: ' + r.status);
            }
        });
    }
    
    // CATEGORIAS
    function loadCats() {
        fetch('/api/categorias?all=1', { headers: { 'Authorization': 'Bearer ' + tk } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var h = '';
            data.forEach(function(c) {
                h += '<tr><td>' + c.nombre + '</td><td><i class="bi ' + c.icono + '"></i></td><td>' + c.orden + '</td><td><button onclick="editC(' + c.id + ')">Edit</button> <button onclick="delC(' + c.id + ')">Del</button></td></tr>';
            });
            document.querySelector('#catTable tbody').innerHTML = h;
        });
    }
    
    function editC(id) {
        fetch('/api/categorias/' + id, { headers: { 'Authorization': 'Bearer ' + tk } })
        .then(function(r) { return r.json(); })
        .then(function(c) {
            document.getElementById('catId').value = id;
            document.getElementById('catNom').value = c.nombre;
            document.getElementById('catIcon').value = c.icono;
            document.getElementById('catOrd').value = c.orden;
        });
    }
    
    function delC(id) {
        if (confirm('Eliminar?')) {
            fetch('/api/categorias/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + tk } })
            .then(function() { loadCats(); });
        }
    }
    
    function saveCat() {
        var nom = document.getElementById('catNom').value;
        if (!nom) { alert('Nombre requerido'); return; }
        
        var id = document.getElementById('catId').value;
        var dat = { nombre: nom, icono: document.getElementById('catIcon').value, orden: parseInt(document.getElementById('catOrd').value) || 0 };
        var url = id ? '/api/categorias/' + id : '/api/categorias';
        var met = id ? 'PUT' : 'POST';
        
        fetch(url, {
            method: met,
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tk },
            body: JSON.stringify(dat)
        })
        .then(function(r) {
            if (r.ok || r.status === 201) {
                alert('Guardado!');
                document.getElementById('catId').value = '';
                document.getElementById('catNom').value = '';
                loadCats();
            }
        });
    }
    
    // IMAGENES
    function loadImgs() {
        fetch('/api/images', { headers: { 'Authorization': 'Bearer ' + tk } })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            var h = '';
            data.forEach(function(i) {
                h += '<div class="col-md-3"><img src="' + i.url + '" class="img-thumbnail" style="height:100px;object-fit:cover;"><br><button onclick="copyUrl(\'' + i.url + '\')">Copiar</button> <button onclick="delImg(\'' + i.name + '\')">Del</button></div>';
            });
            document.getElementById('imgGrid').innerHTML = h || 'Sin imágenes';
        });
    }
    
    function uploadImage() {
        var fi = document.getElementById('fileSel');
        if (!fi.files[0]) { alert('Selecciona archivo'); return; }
        
        var fd = new FormData();
        fd.append('file', fi.files[0]);
        
        fetch('/api/upload', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + tk },
            body: fd
        })
        .then(function(r) {
            if (r.ok) {
                alert('Subido!');
                fi.value = '';
                loadImgs();
            }
        });
    }
    
    function copyUrl(url) {
        navigator.clipboard.writeText(window.location.origin + url);
        alert('URL copiada!');
    }
    
    function delImg(name) {
        if (confirm('Eliminar?')) {
            fetch('/api/images/' + name, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + tk } })
            .then(function() { loadImgs(); });
        }
    }
    
    // CONFIG
    function loadCfg() {
        fetch('/api/configuracion')
        .then(function(r) { return r.json(); })
        .then(function(c) {
            document.getElementById('cfgNom').value = c.nombre_negocio || '';
            document.getElementById('cfgTel').value = c.telefono || '';
            document.getElementById('cfgDir').value = c.direccion || '';
            document.getElementById('cfgIg').value = c.instagram || '';
        });
    }
    
    function saveCfg() {
        fetch('/api/configuracion', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + tk },
            body: JSON.stringify({
                nombre_negocio: document.getElementById('cfgNom').value,
                telefono: document.getElementById('cfgTel').value,
                direccion: document.getElementById('cfgDir').value,
                instagram: document.getElementById('cfgIg').value
            })
        })
        .then(function(r) { if (r.ok) alert('Guardado!'); });
    }
    
    // INIT
    loadProducts();
    loadCats();
    loadImgs();
    loadCfg();
    </script>
</body>
</html>
