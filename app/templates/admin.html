<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ovni Burger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background-color: #fffdfa; font-family: 'Nunito', sans-serif; }
        .card { border: none; border-radius: 40px 10px 40px 10px; box-shadow: -5px 15px 35px rgba(0,0,0,0.08); background: #fffafa; overflow: hidden; transition: all 0.3s;}
        .card:hover { transform: translateY(-5px); box-shadow: -10px 20px 40px rgba(0,0,0,0.12); border-radius: 10px 40px 10px 40px; }
        .nav-pills .nav-link { border-radius: 20px 5px 20px 5px; font-weight: 700; color: #8b4513; margin: 0 5px; transition: all 0.3s;}
        .nav-pills .nav-link.active { background-color: #d4a574; color: #2c1810; border-radius: 5px 20px 5px 20px; }
        .navbar-brand { font-weight: 800; font-size: 1.5rem; text-shadow: 2px 2px 5px rgba(0,0,0,0.3); transition: all 0.3s;}
        .navbar-brand:hover { transform: scale(1.05) rotate(-2deg); }
        .btn { border-radius: 15px 5px 15px 5px; font-weight: bold; transition: all 0.3s;}
        .btn:hover { border-radius: 5px 15px 5px 15px; transform: scale(1.05); }
        .form-control, .form-select { border-radius: 10px 5px 10px 5px; border: 2px solid #e0d5c8; }
        .form-control:focus, .form-select:focus { border-color: #d4a574; box-shadow: 0 0 0 0.2rem rgba(212,165,116,0.25); }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark" style="background: linear-gradient(135deg, #2c1810, #8b4513); border-radius: 0 0 20px 50px; padding: 20px 0; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(44, 24, 16, 0.2);">
        <div class="container">
            <a class="navbar-brand" href="/"><i class="bi bi-ufo"></i> Admin</a>
            <div class="d-flex gap-2">
                <a href="/" class="btn btn-outline-light btn-sm">Ver Menú</a>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Salir</button>
            </div>
        </div>
    </nav>
    <div class="container my-4">
        <h2 class="text-center mb-4">Panel Ovni Burger</h2>
        <ul class="nav nav-pills justify-content-center mb-4">
            <li class="nav-item"><button class="nav-link active" onclick="showTab('productos', this)">Productos</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('categorias', this)">Categorías</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('sugerencias', this)">Sugerencias</button></li>
            <li class="nav-item"><button class="nav-link" onclick="showTab('config', this)">Configuración</button></li>
        </ul>
        
        <div id="tab-productos">
            <div class="card mb-4">
                <div class="card-header bg-success text-white"><h5 class="mb-0"><i class="bi bi-plus-circle"></i> Nuevo Producto</h5></div>
                <div class="card-body">
                    <form id="productForm" class="row g-3">
                        <div class="col-md-2"><label class="form-label">Código</label><input type="text" class="form-control" id="prodCodigo" placeholder="HAM01"></div>
                        <div class="col-md-4"><label class="form-label">Nombre *</label><input type="text" class="form-control" id="prodNombre" required></div>
                        <div class="col-md-3"><label class="form-label">Precio *</label><input type="number" class="form-control" id="prodPrecio" min="0" step="100" required></div>
                        <div class="col-md-3"><label class="form-label">Categoría</label><select class="form-select" id="prodCategoria"><option value="">Seleccionar...</option></select></div>
                        <div class="col-12"><label class="form-label">Descripción</label><textarea class="form-control" id="prodDescripcion" rows="2"></textarea></div>
                        <div class="col-md-4"><label class="form-label">Imagen URL</label><input type="text" class="form-control" id="prodImagen" placeholder="https://..."></div>
                        <div class="col-md-2"><label class="form-label">Stock</label><input type="number" class="form-control" id="prodStock" value="100" min="0"></div>
                        <div class="col-md-2"><label class="form-label">Estado</label><select class="form-select" id="prodDisponible"><option value="true">Activo</option><option value="false">Inactivo</option></select></div>
                        <div class="col-md-4 d-flex align-items-end"><button type="submit" class="btn btn-success w-100"><i class="bi bi-check-lg"></i> Guardar</button></div>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Productos Existentes</h5></div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead class="table-light"><tr><th>Código</th><th>Nombre</th><th>Precio</th><th>Categoría</th><th>Stock</th><th>Estado</th><th>Acciones</th></tr></thead>
                            <tbody id="productsTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="tab-categorias" style="display:none;">
            <div class="card mb-4">
                <div class="card-header bg-success text-white"><h5 class="mb-0"><i class="bi bi-plus-circle"></i> Nueva Categoría</h5></div>
                <div class="card-body">
                    <form id="categoriaForm" class="row g-3">
                        <div class="col-md-4"><label class="form-label">Nombre *</label><input type="text" class="form-control" id="catNombre" required></div>
                        <div class="col-md-4"><label class="form-label">Icono (Bootstrap Icons)</label><input type="text" class="form-control" id="catIcono" placeholder="bi-burger"></div>
                        <div class="col-md-2"><label class="form-label">Orden</label><input type="number" class="form-control" id="catOrden" value="0"></div>
                        <div class="col-md-2 d-flex align-items-end"><button type="submit" class="btn btn-success w-100"><i class="bi bi-check-lg"></i> Guardar</button></div>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Categorías Existentes</h5></div>
                <div class="card-body">
                    <table class="table"><thead><tr><th>Nombre</th><th>Icono</th><th>Orden</th><th>Estado</th><th>Acciones</th></tr></thead>
                    <tbody id="categoriasTable"></tbody></table>
                </div>
            </div>
        </div>
        
        <div id="tab-sugerencias" style="display:none;">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Sugerencias de Clientes</h5></div>
                <div class="card-body">
                    <table class="table"><thead><tr><th>ID</th><th>Nombre</th><th>Tipo</th><th>Mensaje</th><th>Fecha</th><th>Acciones</th></tr></thead>
                    <tbody id="sugerenciasTable"></tbody></table>
                </div>
            </div>
        </div>
        
        <div id="tab-config" style="display:none;">
            <div class="card">
                <div class="card-header"><h5 class="mb-0">Configuración del Negocio</h5></div>
                <div class="card-body">
                    <form id="configForm">
                        <div class="row g-3">
                            <div class="col-md-6"><label class="form-label">Nombre del Negocio</label><input type="text" class="form-control" id="cfgNombre"></div>
                            <div class="col-md-6"><label class="form-label">Teléfono</label><input type="text" class="form-control" id="cfgTel"></div>
                            <div class="col-md-6"><label class="form-label">Dirección</label><input type="text" class="form-control" id="cfgDir"></div>
                            <div class="col-md-6"><label class="form-label">NIT</label><input type="text" class="form-control" id="cfgNit"></div>
                            <div class="col-md-6"><label class="form-label">Instagram</label><input type="text" class="form-control" id="cfgInstagram" placeholder="@burger.ovni"></div>
                            <div class="col-12"><label class="form-label">Mensaje Pie</label><input type="text" class="form-control" id="cfgMsg"></div>
                            <div class="col-12"><button type="submit" class="btn btn-primary">Guardar Configuración</button></div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    const token = localStorage.getItem('token');
    if (!token) window.location.href = '/panel-galaxia-2026';
    
    function logout() { localStorage.clear(); window.location.href = '/panel-galaxia-2026'; }
    function show(msg, type='info') { alert(msg); }
    function showTab(tab, el) {
        ['productos', 'categorias', 'sugerencias', 'config'].forEach(t => document.getElementById('tab-' + t).style.display = t === tab ? 'block' : 'none');
        document.querySelectorAll('.nav-pills .nav-link').forEach(b => b.classList.remove('active'));
        if (el) el.classList.add('active');
        if (tab === 'productos') loadProducts();
        if (tab === 'categorias') loadCategorias();
        if (tab === 'sugerencias') loadSugerencias();
        if (tab === 'config') loadConfig();
    }
    
    async function loadProducts() {
        const res = await fetch('/api/productos', {headers:{'Authorization':'Bearer '+token}});
        if(res.ok){
            const data = await res.json();
            document.getElementById('productsTable').innerHTML = data.map(p => 
                '<tr><td>'+p.codigo+'</td><td><strong>'+p.nombre+'</strong><br><small class="text-muted">'+(p.descripcion||'').substring(0,50)+'</small></td><td>$'+p.precio.toLocaleString()+'</td><td><span class="badge bg-secondary">'+p.categoria+'</span></td><td>'+p.stock+'</td><td>'+(p.disponible ? '<span class="badge bg-success">Activo</span>' : '<span class="badge bg-secondary">Inactivo</span>')+'</td><td><button class="btn btn-sm btn-primary me-1 py-0 px-2" onclick="editProducto('+p.id+')"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-danger py-0 px-2" onclick="delProducto('+p.id+')"><i class="bi bi-trash"></i></button></td></tr>'
            ).join('');
        }
    }
    
    async function loadCategorias() {
        const res = await fetch('/api/categorias?all=1');
        if(res.ok){
            const data = await res.json();
            document.getElementById('categoriasTable').innerHTML = data.map(c => 
                '<tr><td><strong>'+c.nombre+'</strong></td><td><i class="bi '+c.icono+'"></i> '+c.icono+'</td><td>'+c.orden+'</td><td>'+(c.activa ? '<span class="badge bg-success">Activa</span>' : '<span class="badge bg-secondary">Inactiva</span>')+'</td><td><button class="btn btn-sm btn-primary me-1 py-0 px-2" onclick="editCategoria('+c.id+')"><i class="bi bi-pencil"></i></button><button class="btn btn-sm btn-danger py-0 px-2" onclick="delCategoria('+c.id+')"><i class="bi bi-trash"></i></button></td></tr>'
            ).join('');
            loadCategoriasSelect(data);
        }
    }
    
    function loadCategoriasSelect(categorias) {
        let opts = '<option value="">Seleccionar...</option>';
        categorias.forEach(c => { if(c.activa) opts += '<option value="'+c.nombre+'">'+c.nombre+'</option>'; });
        document.getElementById('prodCategoria').innerHTML = opts;
    }
    
    async function loadSugerencias() {
        const res = await fetch('/api/sugerencias', {headers:{'Authorization':'Bearer '+token}});
        if(res.ok){
            const data = await res.json();
            document.getElementById('sugerenciasTable').innerHTML = data.map(s => 
                '<tr><td>'+s.id+'</td><td>'+(s.nombre||'-')+'</td><td><span class="badge bg-info">'+s.tipo+'</span></td><td>'+(s.mensaje||'-').substring(0,50)+'</td><td>'+(s.created_at ? new Date(s.created_at).toLocaleDateString() : '-')+'</td><td><button class="btn btn-sm btn-danger py-0 px-2" onclick="delSugerencia('+s.id+')"><i class="bi bi-trash"></i></button></td></tr>'
            ).join('');
        }
    }
    
    // PRODUCTOS
    let editingProductId = null;
    document.getElementById('productForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            codigo: document.getElementById('prodCodigo').value,
            nombre: document.getElementById('prodNombre').value,
            precio: parseInt(document.getElementById('prodPrecio').value) || 0,
            categoria: document.getElementById('prodCategoria').value,
            descripcion: document.getElementById('prodDescripcion').value,
            imagen: document.getElementById('prodImagen').value,
            stock: parseInt(document.getElementById('prodStock').value) || 0,
            disponible: document.getElementById('prodDisponible').value === 'true'
        };
        const method = editingProductId ? 'PUT' : 'POST';
        const url = editingProductId ? '/api/productos/'+editingProductId : '/api/productos';
        const res = await fetch(url, {
            method: method,
            headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+token},
            body: JSON.stringify(payload)
        });
        if(res.ok){
            show('Producto guardado');
            document.getElementById('productForm').reset();
            editingProductId = null;
            loadProducts();
        }
    };
    
    async function editProducto(id) {
        const res = await fetch('/api/productos/'+id, {headers:{'Authorization':'Bearer '+token}});
        if(res.ok){
            const p = await res.json();
            editingProductId = id;
            document.getElementById('prodCodigo').value = p.codigo || '';
            document.getElementById('prodNombre').value = p.nombre || '';
            document.getElementById('prodPrecio').value = p.precio || 0;
            document.getElementById('prodCategoria').value = p.categoria || '';
            document.getElementById('prodDescripcion').value = p.descripcion || '';
            document.getElementById('prodImagen').value = p.imagen || '';
            document.getElementById('prodStock').value = p.stock || 0;
            document.getElementById('prodDisponible').value = p.disponible ? 'true' : 'false';
        }
    }
    
    async function delProducto(id) {
        if(confirm('¿Eliminar producto?')){
            await fetch('/api/productos/'+id, {method:'DELETE', headers:{'Authorization':'Bearer '+token}});
            loadProducts();
        }
    }
    
    // CATEGORÍAS
    let editingCatId = null;
    document.getElementById('categoriaForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {
            nombre: document.getElementById('catNombre').value,
            icono: document.getElementById('catIcono').value || 'bi-folder',
            orden: parseInt(document.getElementById('catOrden').value) || 0
        };
        if(editingCatId){
            await fetch('/api/categorias/'+editingCatId, {
                method:'PUT',
                headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+token},
                body: JSON.stringify(payload)
            });
        }else{
            await fetch('/api/categorias', {
                method:'POST',
                headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+token},
                body: JSON.stringify(payload)
            });
        }
        show('Categoría guardada');
        document.getElementById('categoriaForm').reset();
        editingCatId = null;
        loadCategorias();
    };
    
    async function editCategoria(id) {
        const res = await fetch('/api/categorias/'+id);
        if(res.ok){
            const c = await res.json();
            editingCatId = id;
            document.getElementById('catNombre').value = c.nombre || '';
            document.getElementById('catIcono').value = c.icono || '';
            document.getElementById('catOrden').value = c.orden || 0;
        }
    }
    
    async function delCategoria(id) {
        if(confirm('¿Eliminar categoría?')){
            await fetch('/api/categorias/'+id, {method:'DELETE', headers:{'Authorization':'Bearer '+token}});
            loadCategorias();
        }
    }
    
    // SUGERENCIAS
    async function delSugerencia(id) {
        if(confirm('¿Eliminar sugerencia?')){
            await fetch('/api/sugerencias/'+id, {method:'DELETE', headers:{'Authorization':'Bearer '+token}});
            loadSugerencias();
        }
    }
    
    // CONFIG
    async function loadConfig() {
        const res = await fetch('/api/configuracion');
        if(res.ok){
            const c = await res.json();
            document.getElementById('cfgNombre').value = c.nombre_negocio || '';
            document.getElementById('cfgTel').value = c.telefono || '';
            document.getElementById('cfgDir').value = c.direccion || '';
            document.getElementById('cfgInstagram').value = c.instagram || '';
            document.getElementById('cfgNit').value = c.nit || '';
            document.getElementById('cfgMsg').value = c.mensaje_pie || '';
        }
    }
    
    document.getElementById('configForm').onsubmit = async (e) => {
        e.preventDefault();
        const res = await fetch('/api/configuracion', {
            method:'PUT',
            headers: {'Content-Type':'application/json', 'Authorization':'Bearer '+token},
            body: JSON.stringify({
                nombre_negocio: document.getElementById('cfgNombre').value,
                direccion: document.getElementById('cfgDir').value,
                telefono: document.getElementById('cfgTel').value,
                nit: document.getElementById('cfgNit').value,
                instagram: document.getElementById('cfgInstagram').value,
                mensaje_pie: document.getElementById('cfgMsg').value
            })
        });
        if(res.ok) show('Configuración guardada');
    };
    
    loadProducts();
    </script>
</body>
</html>
