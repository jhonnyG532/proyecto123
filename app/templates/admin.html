<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ovni Burger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { font-family: 'Nunito', sans-serif; background: #fffdfa; }
        .card { border: none; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.08); }
        .btn { border-radius: 10px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand mb-0 h1">🚀 Admin Ovni Burger</span>
            <div>
                <a href="/" class="btn btn-outline-light btn-sm">Menú</a>
                <button onclick="logout()" class="btn btn-outline-light btn-sm">Salir</button>
            </div>
        </div>
    </nav>
    
    <div class="container my-4">
        <ul class="nav nav-tabs mb-3">
            <li class="nav-item"><a class="nav-link active" href="#" onclick="showTab('productos')">Productos</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('categorias')">Categorías</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('config')">Configuración</a></li>
            <li class="nav-item"><a class="nav-link" href="#" onclick="showTab('imagenes')">Imágenes</a></li>
        </ul>
        
        <!-- PRODUCTOS -->
        <div id="tab-productos">
            <div class="card mb-3">
                <div class="card-header bg-success text-white">Agregar Producto</div>
                <div class="card-body">
                    <input type="hidden" id="prodId">
                    <div class="row">
                        <div class="col-md-4 mb-2">
                            <label>Nombre *</label>
                            <input type="text" class="form-control" id="prodNombre" placeholder="Nombre del producto">
                        </div>
                        <div class="col-md-2 mb-2">
                            <label>Precio *</label>
                            <input type="number" class="form-control" id="prodPrecio" placeholder="0">
                        </div>
                        <div class="col-md-3 mb-2">
                            <label>Categoría</label>
                            <select class="form-control" id="prodCategoria"></select>
                        </div>
                        <div class="col-md-3 mb-2">
                            <label>Imagen URL</label>
                            <input type="text" class="form-control" id="prodImagen" placeholder="https://...">
                        </div>
                        <div class="col-12 mb-2">
                            <label>Descripción</label>
                            <textarea class="form-control" id="prodDescripcion" rows="2"></textarea>
                        </div>
                        <div class="col-md-2 mb-2">
                            <label>Stock</label>
                            <input type="number" class="form-control" id="prodStock" value="100">
                        </div>
                        <div class="col-md-2 mb-2">
                            <label>Estado</label>
                            <select class="form-control" id="prodDisponible">
                                <option value="true">Activo</option>
                                <option value="false">Inactivo</option>
                            </select>
                        </div>
                        <div class="col-md-2 mb-2 d-flex align-items-end">
                            <button class="btn btn-success w-100" onclick="saveProduct()">💾 Guardar</button>
                        </div>
                        <div class="col-md-2 mb-2 d-flex align-items-end">
                            <button class="btn btn-primary w-100" onclick="clearProduct()">➕ Nuevo</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">Lista de Productos</div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0" id="productsTable">
                        <thead><tr><th>Nombre</th><th>Precio</th><th>Catégorie</th><th>Stock</th><th>Estado</th><th>Acciones</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- CATEGORIAS -->
        <div id="tab-categorias" style="display:none;">
            <div class="card mb-3">
                <div class="card-header bg-success text-white">Agregar Categoría</div>
                <div class="card-body">
                    <input type="hidden" id="catId">
                    <div class="row">
                        <div class="col-md-4 mb-2">
                            <label>Nombre *</label>
                            <input type="text" class="form-control" id="catNombre" placeholder="Nombre">
                        </div>
                        <div class="col-md-4 mb-2">
                            <label>Icono</label>
                            <select class="form-control" id="catIcono">
                                <option value="bi-ufo">🚀 Ovni</option>
                                <option value="bi-burger">🍔 Hamburguesa</option>
                                <option value="bi-hot">🌭 Hotdog</option>
                                <option value="bi-french-fries">🍟 Papa</option>
                                <option value="bi-cup-straw">🥤 Bebida</option>
                            </select>
                        </div>
                        <div class="col-md-2 mb-2">
                            <label>Orden</label>
                            <input type="number" class="form-control" id="catOrden" value="0">
                        </div>
                        <div class="col-md-2 mb-2 d-flex align-items-end">
                            <button class="btn btn-success w-100" onclick="saveCategoria()">💾 Guardar</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card">
                <div class="card-header">Lista de Categorías</div>
                <div class="card-body p-0">
                    <table class="table mb-0" id="categoriasTable">
                        <thead><tr><th>Nombre</th><th>Icono</th><th>Orden</th><th>Acciones</th></tr></thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <!-- CONFIG -->
        <div id="tab-config" style="display:none;">
            <div class="card">
                <div class="card-header">Configuración</div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-6 mb-2">
                            <label>Nombre del Negocio</label>
                            <input type="text" class="form-control" id="cfgNombre">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Teléfono</label>
                            <input type="text" class="form-control" id="cfgTel">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Dirección</label>
                            <input type="text" class="form-control" id="cfgDir">
                        </div>
                        <div class="col-md-6 mb-2">
                            <label>Instagram</label>
                            <input type="text" class="form-control" id="cfgInstagram">
                        </div>
                        <div class="col-12">
                            <button class="btn btn-primary" onclick="saveConfig()">💾 Guardar</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- IMAGENES -->
        <div id="tab-imagenes" style="display:none;">
            <div class="card mb-3">
                <div class="card-header bg-success text-white">Subir Imagen</div>
                <div class="card-body">
                    <form id="uploadForm" class="row">
                        <div class="col-md-8">
                            <input type="file" class="form-control" id="fileInput" accept="image/*">
                        </div>
                        <div class="col-md-4">
                            <button type="submit" class="btn btn-success w-100">⬆️ Subir</button>
                        </div>
                    </form>
                </div>
            </div>
            <div class="card">
                <div class="card-header">Imágenes Guardadas</div>
                <div class="card-body">
                    <div class="row" id="imagesGrid"></div>
                </div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    var token = localStorage.getItem('token');
    if (!token) { window.location.href = '/panel-galaxia-2026'; }
    else { console.log('Token OK'); }
    
    function logout() { localStorage.removeItem('token'); window.location.href = '/panel-galaxia-2026'; }
    
    function showTab(tab) {
        document.getElementById('tab-productos').style.display = tab === 'productos' ? 'block' : 'none';
        document.getElementById('tab-categorias').style.display = tab === 'categorias' ? 'block' : 'none';
        document.getElementById('tab-config').style.display = tab === 'config' ? 'block' : 'none';
        document.getElementById('tab-imagenes').style.display = tab === 'imagenes' ? 'block' : 'none';
        document.querySelectorAll('.nav-tabs .nav-link').forEach(function(el) {
            el.classList.remove('active');
            if (el.textContent.toLowerCase() === tab || (tab === 'productos' && el.textContent === 'Productos')) el.classList.add('active');
        });
        if (tab === 'productos') loadProducts();
        else if (tab === 'categorias') loadCategorias();
        else if (tab === 'config') loadConfig();
        else if (tab === 'imagenes') loadImages();
    }
    
    // PRODUCTOS
    function loadProducts() {
        fetch('/api/productos', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            var html = '';
            data.forEach(function(p) {
                html += '<tr>';
                html += '<td><strong>' + (p.nombre || '') + '</strong></td>';
                html += '<td>$' + (p.precio || 0).toLocaleString() + '</td>';
                html += '<td>' + (p.categoria || '-') + '</td>';
                html += '<td>' + p.stock + '</td>';
                html += '<td>' + (p.disponible ? '<span class="badge bg-success">Activo</span>' : '<span class="badge bg-secondary">Inactivo</span>') + '</td>';
                html += '<td><button class="btn btn-sm btn-warning" onclick="editProduct(' + p.id + ')">✏️</button> <button class="btn btn-sm btn-danger" onclick="deleteProduct(' + p.id + ')">🗑️</button></td>';
                html += '</tr>';
            });
            document.querySelector('#productsTable tbody').innerHTML = html;
        })
        .then(function() { return fetch('/api/categorias'); })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            var opts = '<option value="">Seleccionar...</option>';
            data.forEach(function(c) { opts += '<option value="' + c.nombre + '">' + c.nombre + '</option>'; });
            document.getElementById('prodCategoria').innerHTML = opts;
        });
    }
    
    function editProduct(id) {
        fetch('/api/productos/' + id, { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(res) { return res.json(); })
        .then(function(p) {
            document.getElementById('prodId').value = id;
            document.getElementById('prodNombre').value = p.nombre || '';
            document.getElementById('prodPrecio').value = p.precio || 0;
            document.getElementById('prodCategoria').value = p.categoria || '';
            document.getElementById('prodDescripcion').value = p.descripcion || '';
            document.getElementById('prodImagen').value = p.imagen || '';
            document.getElementById('prodStock').value = p.stock || 100;
            document.getElementById('prodDisponible').value = p.disponible ? 'true' : 'false';
        });
    }
    
    function deleteProduct(id) {
        if (confirm('¿Eliminar producto?')) {
            fetch('/api/productos/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } })
            .then(function() { loadProducts(); });
        }
    }
    
    function clearProduct() {
        document.getElementById('prodId').value = '';
        document.getElementById('prodNombre').value = '';
        document.getElementById('prodPrecio').value = '';
        document.getElementById('prodCategoria').value = '';
        document.getElementById('prodDescripcion').value = '';
        document.getElementById('prodImagen').value = '';
        document.getElementById('prodStock').value = '100';
        document.getElementById('prodDisponible').value = 'true';
    }
    
    function saveProduct() {
        var nombre = document.getElementById('prodNombre').value.trim();
        var precio = parseInt(document.getElementById('prodPrecio').value) || 0;
        if (!nombre || !precio) { alert('Nombre y precio son requeridos'); return; }
        
        var id = document.getElementById('prodId').value;
        var payload = {
            nombre: nombre,
            precio: precio,
            categoria: document.getElementById('prodCategoria').value,
            descripcion: document.getElementById('prodDescripcion').value,
            imagen: document.getElementById('prodImagen').value,
            stock: parseInt(document.getElementById('prodStock').value) || 100,
            disponible: document.getElementById('prodDisponible').value === 'true'
        };
        
        var url = id ? '/api/productos/' + id : '/api/productos';
        var method = id ? 'PUT' : 'POST';
        
        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(payload)
        })
        .then(function(res) { 
            console.log('Save product response:', res.status); 
            if (res.ok || res.status === 201) {
                alert('✅ Guardado!');
                clearProduct();
                loadProducts();
            } else {
                res.text().then(function(t) { alert('Error: ' + t); console.log('Error:', t); });
            }
        });
    }
    
    // CATEGORIAS
    function loadCategorias() {
        fetch('/api/categorias?all=1', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            var html = '';
            data.forEach(function(c) {
                html += '<tr><td><strong>' + c.nombre + '</strong></td><td><i class="bi ' + c.icono + '"></i></td><td>' + c.orden + '</td>';
                html += '<td><button class="btn btn-sm btn-warning" onclick="editCategoria(' + c.id + ')">✏️</button> <button class="btn btn-sm btn-danger" onclick="deleteCategoria(' + c.id + ')">🗑️</button></td></tr>';
            });
            document.querySelector('#categoriasTable tbody').innerHTML = html;
        });
    }
    
    function editCategoria(id) {
        fetch('/api/categorias/' + id, { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(res) { return res.json(); })
        .then(function(c) {
            document.getElementById('catId').value = id;
            document.getElementById('catNombre').value = c.nombre || '';
            document.getElementById('catIcono').value = c.icono || 'bi-burger';
            document.getElementById('catOrden').value = c.orden || 0;
        });
    }
    
    function deleteCategoria(id) {
        if (confirm('¿Eliminar categoría?')) {
            fetch('/api/categorias/' + id, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } })
            .then(function() { loadCategorias(); });
        }
    }
    
    function saveCategoria() {
        var nombre = document.getElementById('catNombre').value.trim();
        if (!nombre) { alert('Nombre requerido'); return; }
        
        var id = document.getElementById('catId').value;
        var payload = {
            nombre: nombre,
            icono: document.getElementById('catIcono').value,
            orden: parseInt(document.getElementById('catOrden').value) || 0
        };
        
        var url = id ? '/api/categorias/' + id : '/api/categorias';
        var method = id ? 'PUT' : 'POST';
        
        fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify(payload)
        })
        .then(function(res) { 
            if (res.ok || res.status === 201) {
                alert('✅ Guardado!');
                document.getElementById('catId').value = '';
                document.getElementById('catNombre').value = '';
                document.getElementById('catOrden').value = '0';
                loadCategorias();
            }
        });
    }
    
    // CONFIG
    function loadConfig() {
        fetch('/api/configuracion')
        .then(function(res) { return res.json(); })
        .then(function(c) {
            document.getElementById('cfgNombre').value = c.nombre_negocio || '';
            document.getElementById('cfgTel').value = c.telefono || '';
            document.getElementById('cfgDir').value = c.direccion || '';
            document.getElementById('cfgInstagram').value = c.instagram || '';
        });
    }
    
    function saveConfig() {
        fetch('/api/configuracion', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({
                nombre_negocio: document.getElementById('cfgNombre').value,
                telefono: document.getElementById('cfgTel').value,
                direccion: document.getElementById('cfgDir').value,
                instagram: document.getElementById('cfgInstagram').value
            })
        })
        .then(function(res) { 
            if (res.ok) alert('✅ Guardado!');
        });
    }
    
    // IMAGENES
    function loadImages() {
        fetch('/api/images', { headers: { 'Authorization': 'Bearer ' + token } })
        .then(function(res) { return res.json(); })
        .then(function(imgs) {
            var html = '';
            imgs.forEach(function(img) {
                html += '<div class="col-md-3 mb-3">';
                html += '<div class="card">';
                html += '<img src="' + img.url + '" class="card-img-top" style="height:150px;object-fit:cover;">';
                html += '<div class="card-body p-2 text-center">';
                html += '<button class="btn btn-sm btn-primary me-1" onclick="copyUrl(\'' + img.url + '\')">📋 Copiar URL</button>';
                html += '<button class="btn btn-sm btn-danger" onclick="deleteImage(\'' + img.name + '\')">🗑️</button>';
                html += '</div></div></div>';
            });
            document.getElementById('imagesGrid').innerHTML = html || '<p class="text-muted">No hay imágenes</p>';
        });
    }
    
    function copyUrl(url) {
        navigator.clipboard.writeText(window.location.origin + url).then(function() {
            alert('URL copiada!');
        });
    }
    
    function deleteImage(name) {
        if (confirm('¿Eliminar imagen?')) {
            fetch('/api/images/' + name, { method: 'DELETE', headers: { 'Authorization': 'Bearer ' + token } })
            .then(function() { loadImages(); });
        }
    }
    
    document.getElementById('uploadForm').onsubmit = function(e) {
        e.preventDefault();
        var fileInput = document.getElementById('fileInput');
        if (!fileInput.files[0]) { alert('Selecciona un archivo'); return; }
        
        var formData = new FormData();
        formData.append('file', fileInput.files[0]);
        
        fetch('/api/upload', {
            method: 'POST',
            headers: { 'Authorization': 'Bearer ' + token },
            body: formData
        })
        .then(function(res) { 
            if (res.ok) {
                alert('✅ Imagen subida!');
                fileInput.value = '';
                loadImages();
            }
        });
    };
    
    // Init
    loadProducts();
    </script>
</body>
</html>
