<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ovni Burger</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #2c1810, #8b4513); min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; font-family: 'Nunito', sans-serif; }
        body::before { content: ''; position: absolute; width: 300px; height: 300px; background: rgba(255,255,255,0.05); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; top: -50px; left: -50px; animation: morph 8s infinite alternate; }
        body::after { content: ''; position: absolute; width: 400px; height: 400px; background: rgba(255,255,255,0.02); border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; bottom: -100px; right: -100px; animation: morph 12s infinite alternate-reverse; }
        @keyframes morph { 0% { transform: rotate(0deg); } 100% { transform: rotate(180deg); } }
        .login-card { background: white; border-radius: 50px 20px 50px 20px; padding: 40px; max-width: 400px; width: 100%; box-shadow: -10px 20px 40px rgba(0,0,0,0.4); position: relative; z-index: 1; transition: all 0.4s; }
        .login-card:hover { border-radius: 20px 50px 20px 50px; transform: scale(1.02); }
        .form-control { border: 2px solid #e9ecef; border-radius: 15px 5px 15px 5px; padding: 12px; transition: all 0.3s; }
        .form-control:focus { border-color: #d4a574; box-shadow: none; border-radius: 5px 15px 5px 15px; }
        .btn-primary { background: linear-gradient(135deg, #2c1810, #8b4513); border: none; border-radius: 20px 5px 20px 5px; padding: 12px; font-weight: 800; transition: all 0.3s; }
        .btn-primary:hover { transform: translateY(-2px) scale(1.02); box-shadow: 0 5px 20px rgba(44, 24, 16, 0.4); border-radius: 5px 20px 5px 20px; }
    </style>
</head>
<body>
    <div class="login-card text-center">
        <h1 class="mb-4"><i class="bi bi-ufo"></i> Ovni Burger</h1>
        <p class="text-muted mb-4">Ingresa al panel de administración</p>
        <form id="loginForm">
            <div class="mb-3">
                <input type="text" class="form-control" id="username" placeholder="Usuario" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="password" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Ingresar
            </button>
        </form>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
    document.getElementById('loginForm').onsubmit = async (e) => {
        e.preventDefault();
        const btn = e.target.querySelector('button');
        btn.disabled = true;
        btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span>...';
        
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            })
        });
        const data = await res.json();
        
        if (data.access_token) {
            localStorage.setItem('token', data.access_token);
            localStorage.setItem('username', data.username);
            window.location.href = '/panel-galaxia-2026/dashboard';
        } else {
            alert(data.error || 'Credenciales inválidas');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
        }
    };
    </script>
</body>
</html>
