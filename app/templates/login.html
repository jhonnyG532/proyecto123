<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ovni Burger</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #0a0b14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(123, 44, 191, 0.3) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 245, 212, 0.2) 0%, transparent 50%);
            pointer-events: none;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00f5d4;
            border-radius: 50%;
            opacity: 0.4;
            animation: float 20s linear infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.4; }
            90% { opacity: 0.4; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .login-card {
            background: #12141f;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .login-logo {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, #00f5d4, #7b2cbf);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 1.8rem;
            color: #0a0b14;
            box-shadow: 0 10px 30px rgba(0, 245, 212, 0.3);
        }

        .login-header h1 {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 6px;
        }

        .login-header p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.1rem;
            pointer-events: none;
        }

        .form-control {
            width: 100%;
            padding: 14px 14px 14px 46px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #ffffff !important;
            font-size: 1rem;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: #00f5d4;
            box-shadow: 0 0 0 3px rgba(0, 245, 212, 0.15);
            background: rgba(0, 0, 0, 0.4);
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.35) !important;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00f5d4, #00bbf9);
            border: none;
            border-radius: 10px;
            color: #0a0b14;
            font-size: 1rem;
            font-weight: 700;
            font-family: 'Space Grotesk', sans-serif;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 24px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 245, 212, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: rgba(255, 71, 87, 0.15);
            border: 1px solid rgba(255, 71, 87, 0.4);
            color: #ff6b7a;
            padding: 12px 14px;
            border-radius: 10px;
            margin-bottom: 16px;
            font-size: 0.85rem;
            display: none;
        }
        .error-message.show { display: block; }

        .back-link {
            text-align: center;
            margin-top: 24px;
        }
        .back-link a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.3s;
        }
        .back-link a:hover { color: #00f5d4; }

        @media (max-width: 480px) {
            .login-card { padding: 30px 24px; }
            .login-logo { width: 60px; height: 60px; font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-logo">
                    <i class="bi bi-rocket-takeoff"></i>
                </div>
                <h1>Bienvenido</h1>
                <p>Panel de administracion</p>
            </div>

            <div class="error-message" id="errorMsg">
                <i class="bi bi-exclamation-circle"></i>
                <span id="errorText">Credenciales invalidas</span>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label">Usuario</label>
                    <div class="input-wrapper">
                        <input type="text" class="form-control" id="username" placeholder="Tu usuario" required autocomplete="username">
                        <i class="bi bi-person input-icon"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">Contrasena</label>
                    <div class="input-wrapper">
                        <input type="password" class="form-control" id="password" placeholder="Tu contrasena" required autocomplete="current-password">
                        <i class="bi bi-lock input-icon"></i>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span id="btnText">Ingresar</span>
                </button>
            </form>

            <div class="back-link">
                <a href="/">
                    <i class="bi bi-arrow-left"></i> Volver al menu
                </a>
            </div>
        </div>
    </div>

    <script>
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 15; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 20 + 's';
            p.style.animationDuration = (Math.random() * 15 + 15) + 's';
            particlesContainer.appendChild(p);
        }

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const errorMsg = document.getElementById('errorMsg');
            
            btn.disabled = true;
            btnText.innerHTML = 'Cargando...';
            errorMsg.classList.remove('show');

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: document.getElementById('username').value,
                        password: document.getElementById('password').value
                    })
                });
                const data = await res.json();

                if (data.access_token) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('username', data.username);
                    window.location.href = '/panel-galaxia-2026/dashboard';
                } else {
                    errorMsg.classList.add('show');
                    document.getElementById('errorText').textContent = data.error || 'Credenciales invalidas';
                    btn.disabled = false;
                    btnText.innerHTML = 'Ingresar';
                }
            } catch (err) {
                errorMsg.classList.add('show');
                document.getElementById('errorText').textContent = 'Error de conexion';
                btn.disabled = false;
                btnText.innerHTML = 'Ingresar';
            }
        };
    </script>
</body>
</html>
